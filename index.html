<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8fafc; --surface:#ffffff; --surface2:#f1f5f9;
  --border:#e2e8f0; --text:#0f172a; --text2:#334155; --muted:#64748b;
  --primary:#4f46e5; --primary-lt:#eef2ff; --primary-dk:#4338ca;
  --secondary:#14b8a6; --secondary-lt:#ccfbf1;
  --green:#15803d; --red:#b91c1c; --amber:#b45309;
  --shadow:0 4px 12px rgba(0,0,0,.05); --radius:12px; --radius-sm:8px;
  --font-head:'Manrope',sans-serif; --font-body:'Inter',sans-serif;
}
[data-theme="dark"]{
  --bg:#0f172a; --surface:#1e293b; --surface2:#0f172a;
  --border:#334155; --text:#f1f5f9; --text2:#cbd5e1; --muted:#94a3b8;
  --primary:#a5b4fc; --primary-lt:#2d3a5e; --primary-dk:#c7d2fe;
  --secondary:#2dd4bf; --secondary-lt:#134e4a;
  --shadow:0 6px 14px rgba(0,0,0,.5);
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:60px;gap:12px;box-shadow:var(--shadow)}
.topbar-logo{width:34px;height:34px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar-title{font-family:var(--font-head);font-size:18px;font-weight:800;flex:1;letter-spacing:-0.3px}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:16px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--primary-lt);border-color:var(--primary)}
.fb-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px}
.fb-dot.live{background:#10b981;box-shadow:0 0 0 2px #10b98140}
.hero{padding:36px 24px 28px;text-align:center;border-bottom:1px solid var(--border)}
.hero-badge{background:var(--primary-lt);color:var(--primary);font-size:12px;font-weight:700;padding:4px 16px;border-radius:40px;display:inline-block;margin-bottom:16px}
.hero h1{font-family:var(--font-head);font-size:clamp(28px,6vw,44px);font-weight:800;letter-spacing:-1px;margin-bottom:12px}
.search-wrap{position:relative;max-width:560px;margin:20px auto 0}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
#searchInput{width:100%;padding:12px 44px;background:var(--surface);border:1.5px solid var(--border);border-radius:60px;font-size:14px;transition:all .2s}
#searchInput:focus{border-color:var(--primary);outline:none}
#clearBtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--surface2);border:none;width:22px;height:22px;border-radius:50%;display:none;font-size:12px}
.stats{display:flex;justify-content:center;gap:42px;padding:24px 16px 8px}
.stat-num{font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--primary)}
.specimen-tabs{display:flex;gap:8px;overflow-x:auto;padding:0 0 8px;margin-bottom:12px}
.stab{flex-shrink:0;padding:6px 18px;border-radius:40px;border:1px solid var(--border);background:var(--surface);font-weight:500;font-size:13px;transition:all .2s}
.stab.active{background:var(--primary);border-color:var(--primary);color:white}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px}
.pill{padding:5px 14px;border-radius:40px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500}
.pill.active{background:var(--text);border-color:var(--text);color:var(--bg)}
.ad-slot{padding:8px 20px;text-align:center;background:var(--surface2);margin:8px 0}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.test-card{background:var(--surface);border:1px solid var(--border);border-left-width:4px;border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s}
.test-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.test-name{font-weight:700;font-size:14px;margin-bottom:4px}
.range-pill{font-size:12px;font-weight:700;padding:2px 10px;border-radius:20px;background:var(--primary-lt);color:var(--primary-dk)}
.modal,.confirm-modal{background:var(--surface);border-radius:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.close-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:30px;height:30px}
.btn{padding:10px 18px;border-radius:12px;font-weight:700;font-size:13px;border:none;cursor:pointer}
.btn-primary{background:var(--primary);color:white}
.btn-outline{background:transparent;border:1px solid var(--border)}
.btn-danger{background:var(--red);color:white}
#adminPanel{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;flex-direction:column}
#adminPanel.open{display:flex}
.admin-bar{background:var(--primary);padding:14px 20px;display:flex;gap:12px;align-items:center}
.admin-list{padding:16px;overflow-y:auto;flex:1}
.admin-row{background:var(--surface);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:700;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .2s}
.overlay.open{opacity:1;visibility:visible}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;padding:10px 20px;border-radius:40px;z-index:9999;transition:transform .25s;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyA1QvsZosAd0MEmGKlktHsqyzOfm4-9lI4", authDomain: "medlab-db.firebaseapp.com", projectId: "medlab-db", storageBucket: "medlab-db.firebasestorage.app", messagingSenderId: "310991760752", appId: "1:310991760752:web:15d7e49ef4a84f8a78b3b5" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
window._db = db;
window._testsCol = () => collection(db, "medtests");
window._userRangesCol = () => collection(db, "userRanges");
window._testDoc = (id) => doc(db, "medtests", String(id));
window._rangeDoc = (uid, testId) => doc(db, "userRanges", `${uid}_${testId}`);
window._getDocs = getDocs; window._setDoc = setDoc; window._delDoc = deleteDoc; window._batch = () => writeBatch(db);
window._signIn = signInWithEmailAndPassword; window._signOut = signOut; window._createUser = createUserWithEmailAndPassword;
window._auth = auth;
window._fbReady = true;
onAuthStateChanged(auth, (user) => { window._fbUser = user; if(typeof window.updateAuthUI === 'function') window.updateAuthUI(); if(user && typeof window.loadUserRangesFromFirestore === 'function') window.loadUserRangesFromFirestore(); else if(!user && typeof window.clearUserRangesOnLogout === 'function') window.clearUserRangesOnLogout(); });
console.log("Firebase ready");

<script>
// Global state
let tests = [...window.MASTER_TESTS];
let activeSpecimen = 'All', activeCategory = 'All', searchQuery = '';
let userRanges = {};
let editingId = null, deleteTargetId = null;

// Helper
function saveToLocalRanges() { for(let id in userRanges) localStorage.setItem(`ur_${id}`, JSON.stringify(userRanges[id])); }
function loadLocalRanges() { for(let i=0;i<localStorage.length;i++){ let k=localStorage.key(i); if(k && k.startsWith('ur_')){ let id=k.replace('ur_',''); try{ userRanges[id]=JSON.parse(localStorage.getItem(k)); }catch(e){} } } }

// Render core
function filteredTests(){
  let q = searchQuery.toLowerCase();
  return tests.filter(t => {
    let matchSearch = !q || t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q);
    let matchSpec = activeSpecimen === 'All' || (t.specimen||'Blood') === activeSpecimen;
    let matchCat = activeCategory === 'All' || t.category === activeCategory;
    return matchSearch && matchSpec && matchCat;
  });
}
function render(){
  let filtered = filteredTests();
  let groups = {};
  filtered.forEach(t => { if(!groups[t.category]) groups[t.category]=[]; groups[t.category].push(t); });
  let catsList = ['All', ...Object.keys(groups).sort()];
  let filterHtml = catsList.map(c => `<button class="pill ${activeCategory===c?'active':''}" onclick="setCategory('${c.replace(/'/g,"\\'")}')">${c==='All'?'🔬 All':(window.getMeta(c).icon+' '+c)}</button>`).join('');
  document.getElementById('filterPills').innerHTML = filterHtml;
  document.getElementById('resultsInfo').innerHTML = `<b>${filtered.length}</b> test${filtered.length!==1?'s':''} found`;
  let testHtml = '';
  for(let cat in groups){
    let m = window.getMeta(cat);
    testHtml += `<div class="cat-group" style="margin-bottom:28px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:22px">${m.icon}</span><span style="font-weight:800;font-size:15px;color:${m.accent}">${cat}</span><div style="flex:1;height:1px;background:var(--border)"></div><span style="background:${m.accent}20;padding:2px 8px;border-radius:20px;font-size:11px">${groups[cat].length}</span></div><div class="test-grid">`;
    groups[cat].forEach(t => {
      let cr = userRanges[t.id];
      let lo = cr ? cr.low : t.low, hi = cr ? cr.high : t.high;
      testHtml += `<div class="test-card" style="border-left-color:${m.accent}" onclick="openDetail(${t.id})"><div><div class="test-name">${t.name}${cr?'<span style="color:var(--primary);margin-left:4px">★</span>':''}</div><div class="test-desc" style="font-size:11px;color:var(--muted)">${t.description||''}</div></div><div class="range-pill">${lo}–${hi} ${t.unit}</div></div>`;
    });
    testHtml += `</div></div>`;
  }
  document.getElementById('testList').innerHTML = testHtml || '<div class="empty" style="padding:60px;text-align:center">🔍 No matches</div>';
  document.getElementById('statTests').innerText = tests.length;
  document.getElementById('statCats').innerText = [...new Set(tests.map(t=>t.category))].length;
  document.getElementById('drawerSub').innerHTML = `${tests.length} tests · ${Object.keys(window.CAT_META).length}+ categories`;
}
function setCategory(cat){ activeCategory = cat; render(); }
function setSpecimen(sp){ activeSpecimen = sp; activeCategory = 'All'; document.querySelectorAll('.stab').forEach(btn => btn.classList.toggle('active', btn.dataset.sp === sp)); render(); }
function onSearch(v){ searchQuery = v; document.getElementById('clearBtn').style.display = v ? 'flex' : 'none'; render(); }
function clearSearch(){ searchQuery=''; document.getElementById('searchInput').value=''; render(); }

// Detail & user ranges
async function openDetail(id){
  let t = tests.find(x=>x.id==id);
  if(!t) return;
  let m = window.getMeta(t.category);
  let cr = userRanges[t.id];
  let lo = cr ? cr.low : t.low, hi = cr ? cr.high : t.high;
  let html = `<div style="background:${m.accent}10;padding:18px;border-bottom:1px solid var(--border)"><button class="close-btn" style="float:right" onclick="closeDetail()">✕</button><div style="font-size:32px">${m.icon}</div><h2 style="font-size:20px">${t.name}</h2><div>${t.category} · ${t.specimen||'Blood'}</div></div><div style="padding:18px"><div style="background:var(--surface2);padding:12px;border-radius:12px;margin-bottom:16px">ℹ️ ${t.description}</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px"><div style="text-align:center"><div>⬇️</div><div style="font-weight:800">${lo}</div><div style="font-size:10px">Low</div></div><div style="text-align:center"><div>⬆️</div><div style="font-weight:800">${hi}</div><div>High</div></div><div style="text-align:center"><div>📏</div><div><b>${t.unit}</b></div></div></div>`;
  if(window._fbUser){
    html += `<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px"><div style="font-weight:600;margin-bottom:8px">✏️ My personal range</div><div style="display:flex;gap:8px"><input id="myLow" type="number" step="any" value="${cr?cr.low:t.low}" style="flex:1;padding:8px;border-radius:8px;background:var(--surface2);border:1px solid var(--border)"><input id="myHigh" type="number" step="any" value="${cr?cr.high:t.high}" style="flex:1;padding:8px;border-radius:8px;background:var(--surface2);border:1px solid var(--border)"></div><div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-primary" onclick="saveUserRange(${t.id},'${t.unit}')">Save my range</button>${cr?`<button class="btn btn-outline" onclick="clearUserRange(${t.id})">Reset</button>`:''}</div></div>`;
  } else { html += `<div class="form-hint" style="background:var(--surface2);padding:12px;border-radius:12px">🔐 Login to set personal reference ranges</div>`; }
  html += `</div>`;
  document.getElementById('detailModal').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); }
async function saveUserRange(id, unit){
  let low = parseFloat(document.getElementById('myLow').value);
  let high = parseFloat(document.getElementById('myHigh').value);
  if(isNaN(low)||isNaN(high)||low>high){ toast('Invalid range: low must be ≤ high','red'); return; }
  userRanges[id] = {low, high, unit};
  saveToLocalRanges();
  if(window._fbUser && window._rangeDoc){
    try{ await window._setDoc(window._rangeDoc(window._fbUser.uid, id), { uid:window._fbUser.uid, testId:id, low, high, unit }); }catch(e){}
  }
  closeDetail(); render(); toast('✔️ Personal range saved','green');
}
async function clearUserRange(id){
  delete userRanges[id];
  localStorage.removeItem(`ur_${id}`);
  if(window._fbUser && window._rangeDoc) await window._delDoc(window._rangeDoc(window._fbUser.uid, id)).catch(()=>{});
  closeDetail(); render(); toast('Range reset');
}
async function loadUserRangesFromFirestore(){
  if(!window._fbUser) return;
  try{
    let col = window._userRangesCol();
    let snap = await window._getDocs(col);
    snap.forEach(docSnap => {
      let data = docSnap.data();
      if(data.uid === window._fbUser.uid && data.testId) userRanges[data.testId] = { low:data.low, high:data.high, unit:data.unit };
    });
    saveToLocalRanges(); render();
  } catch(e){ console.warn(e); }
}
function clearUserRangesOnLogout(){ userRanges = {}; render(); }

// Admin functions
function openAdmin(){ document.getElementById('adminPanel').classList.add('open'); renderAdmin(''); }
function closeAdmin(){ document.getElementById('adminPanel').classList.remove('open'); render(); }
function renderAdmin(q){
  let search = (q !== undefined) ? q.toLowerCase() : (document.getElementById('adminSearch')?.value.toLowerCase() || '');
  let filtered = search ? tests.filter(t=> t.name.toLowerCase().includes(search) || t.category.toLowerCase().includes(search)) : tests;
  let groups = {};
  filtered.forEach(t=>{ if(!groups[t.category]) groups[t.category]=[]; groups[t.category].push(t); });
  let html = '';
  for(let cat in groups){
    let m = window.getMeta(cat);
    html += `<div style="margin-top:12px"><div style="display:flex;align-items:center;gap:6px"><span style="background:${m.accent};width:8px;height:8px;border-radius:50%"></span><span style="font-weight:700">${m.icon} ${cat}</span></div>`;
    groups[cat].forEach(t => {
      html += `<div class="admin-row"><div style="flex:1"><strong>${t.name}</strong><div style="font-size:11px">${t.low}–${t.high} ${t.unit}</div></div><button class="btn-edit-sm" style="padding:4px 10px;background:var(--secondary-lt);border-radius:20px" onclick="openTestForm(${t.id})">✏️</button><button class="btn-del-sm" style="padding:4px 10px;background:#ffe6e6;border-radius:20px;margin-left:6px" onclick="confirmDeleteTest(${t.id})">🗑️</button></div>`;
    });
    html += `</div>`;
  }
  document.getElementById('adminList').innerHTML = html || '<div style="padding:40px;text-align:center">No tests</div>';
}
async function resetMasterToFirebase(){
  if(!confirm("⚠️ RESET MASTER: This will overwrite ALL tests in Firebase with the original static dataset. Custom tests will be lost. Continue?")) return;
  let batch = window._batch();
  for(let t of window.MASTER_TESTS){ batch.set(window._testDoc(t.id), t); }
  await batch.commit();
  tests = [...window.MASTER_TESTS];
  renderAdmin('');
  render();
  toast('Master data restored from static set','green');
}
function openTestForm(id){
  editingId = id;
  let test = id ? tests.find(t=>t.id===id) : null;
  let cats = [...new Set([...Object.keys(window.CAT_META), ...tests.map(t=>t.category)])].sort();
  let formHtml = `<div class="form-group"><label>Test name</label><input id="fName" class="form-input" value="${test ? test.name.replace(/"/g,'&quot;') : ''}" style="width:100%"></div>
  <div class="form-group"><label>Category</label><select id="fCat" class="form-select" style="width:100%">${cats.map(c=>`<option value="${c}" ${test && test.category===c ? 'selected' : ''}>${window.getMeta(c).icon} ${c}</option>`).join('')}<option value="__new__">✨ + New category</option></select></div>
  <div id="newCatDiv" style="display:none;margin-bottom:12px"><input id="newCatName" placeholder="New category name" class="form-input" style="width:100%"></div>
  <div class="form-group"><label>Specimen</label><select id="fSpecimen" class="form-select"><option ${test?.specimen==='Blood'?'selected':''}>Blood</option><option ${test?.specimen==='Urine'?'selected':''}>Urine</option><option ${test?.specimen==='Stool'?'selected':''}>Stool</option><option ${test?.specimen==='CSF'?'selected':''}>CSF</option><option ${test?.specimen==='Semen'?'selected':''}>Semen</option></select></div>
  <div style="display:flex;gap:12px"><div class="form-group"><label>Low</label><input id="fLow" type="number" step="any" value="${test?.low??''}" style="width:100%"></div><div class="form-group"><label>High</label><input id="fHigh" type="number" step="any" value="${test?.high??''}" style="width:100%"></div></div>
  <div class="form-group"><label>Unit</label><input id="fUnit" value="${test?.unit??''}" style="width:100%"></div>
  <div class="form-group"><label>Description</label><textarea id="fDesc" style="width:100%">${test?.description??''}</textarea></div>
  <button class="btn btn-primary" onclick="saveTestForm()">💾 Save test</button>`;
  document.getElementById('testFormBody').innerHTML = formHtml;
  document.getElementById('fCat').addEventListener('change', (e) => { document.getElementById('newCatDiv').style.display = e.target.value === '__new__' ? 'block' : 'none'; });
  if(document.getElementById('fCat').value === '__new__') document.getElementById('newCatDiv').style.display = 'block';
  document.getElementById('testFormOverlay').classList.add('open');
}
async function saveTestForm(){
  let name = document.getElementById('fName').value.trim();
  let catSel = document.getElementById('fCat').value;
  let finalCat = catSel === '__new__' ? document.getElementById('newCatName').value.trim() : catSel;
  let specimen = document.getElementById('fSpecimen').value;
  let low = parseFloat(document.getElementById('fLow').value);
  let high = parseFloat(document.getElementById('fHigh').value);
  let unit = document.getElementById('fUnit').value.trim();
  let desc = document.getElementById('fDesc').value.trim();
  if(!name || !finalCat || isNaN(low) || isNaN(high) || low>high || !unit){ toast('All fields required and low ≤ high','red'); return; }
  let newTest = { id: editingId || Date.now(), name, category: finalCat, specimen, low, high, unit, description: desc };
  if(editingId){ tests = tests.map(t => t.id === editingId ? newTest : t); }
  else { tests.push(newTest); }
  if(window._fbReady && window._setDoc) await window._setDoc(window._testDoc(newTest.id), newTest).catch(e=>toast('FB sync error','red'));
  closeTestForm();
  renderAdmin('');
  render();
  toast(editingId ? 'Test updated' : 'Test added','green');
  editingId = null;
}
function confirmDeleteTest(id){
  deleteTargetId = id;
  if(confirm("Permanently delete this test?")) doDeleteTest();
}
async function doDeleteTest(){
  if(!deleteTargetId) return;
  tests = tests.filter(t => t.id !== deleteTargetId);
  if(window._fbReady) await window._delDoc(window._testDoc(deleteTargetId)).catch(()=>{});
  renderAdmin('');
  render();
  toast('Test deleted','red');
  deleteTargetId = null;
}
function closeTestForm(){ document.getElementById('testFormOverlay').classList.remove('open'); editingId=null; }

// Auth & UI helpers
function openAdminLogin(){ document.getElementById('adminLoginOverlay').classList.add('open'); }
function closeAdminLogin(){ document.getElementById('adminLoginOverlay').classList.remove('open'); }
async function doAdminLogin(){
  let email = document.getElementById('adminEmail').value, pass = document.getElementById('adminPass').value;
  if(!email||!pass){ document.getElementById('adminLoginErr').innerText='Enter credentials'; return; }
  try{ await window._signIn(window._auth, email, pass); closeAdminLogin(); openAdmin(); toast('Admin logged in'); } catch(e){ document.getElementById('adminLoginErr').innerText=e.message; }
}
async function doAdminLogout(){ await window._signOut(window._auth); closeAdmin(); toast('Admin logged out'); }
function openUserModal(){
  let user = window._fbUser;
  let body = !user ? `<div><input id="userEmail" placeholder="Email" style="width:100%;margin-bottom:8px;padding:10px"><input id="userPass" type="password" placeholder="Password" style="width:100%;margin-bottom:12px;padding:10px"><button class="btn btn-primary" onclick="doUserLogin()">Login</button> <button class="btn btn-outline" onclick="doUserSignup()">Sign up</button><div id="userErr" style="color:red;margin-top:8px"></div></div>` : `<div style="text-align:center"><div>👤 ${user.email}</div><button class="btn btn-outline" style="margin-top:16px" onclick="userLogout()">Logout</button></div>`;
  document.getElementById('userModalBody').innerHTML = body;
  document.getElementById('userOverlay').classList.add('open');
}
async function doUserLogin(){ let e=document.getElementById('userEmail').value, p=document.getElementById('userPass').value; try{ await window._signIn(window._auth,e,p); closeUserModal(); toast('Logged in'); }catch(err){ document.getElementById('userErr').innerText=err.message; } }
async function doUserSignup(){ let e=document.getElementById('userEmail').value, p=document.getElementById('userPass').value; try{ await window._createUser(window._auth,e,p); closeUserModal(); toast('Account created'); }catch(err){ document.getElementById('userErr').innerText=err.message; } }
async function userLogout(){ await window._signOut(window._auth); closeUserModal(); render(); }
function closeUserModal(){ document.getElementById('userOverlay').classList.remove('open'); }
function openSuggest(){ document.getElementById('suggestOverlay').classList.add('open'); }
function closeSuggest(){ document.getElementById('suggestOverlay').classList.remove('open'); }
function submitSuggest(){ let name=document.getElementById('sugTestName').value; if(!name){ alert('Enter test name'); return; } alert('Suggestion sent (demo). Thank you!'); closeSuggest(); }
function openDrawer(){ document.getElementById('drawer').style.transform='translateX(0)'; document.getElementById('drawerOverlay').style.display='block'; }
function closeDrawer(){ document.getElementById('drawer').style.transform='translateX(-100%)'; document.getElementById('drawerOverlay').style.display='none'; }
function toast(msg,type){ let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function toggleTheme(){ let dark=document.documentElement.getAttribute('data-theme')==='dark'; document.documentElement.setAttribute('data-theme',dark?'light':'dark'); localStorage.setItem('theme',dark?'light':'dark'); }
function initTheme(){ let saved=localStorage.getItem('theme'); if(saved==='dark') document.documentElement.setAttribute('data-theme','dark'); }
window.updateAuthUI = () => { let user = window._fbUser; if(!user) userRanges={}; render(); };
window.loadUserRangesFromFirestore = loadUserRangesFromFirestore;
window.clearUserRangesOnLogout = clearUserRangesOnLogout;
window.setCategory = setCategory;
window.setSpecimen = setSpecimen;
window.openDetail = openDetail; window.closeDetail = closeDetail;
window.saveUserRange = saveUserRange; window.clearUserRange = clearUserRange;
window.openTestForm = openTestForm; window.closeTestForm = closeTestForm; window.saveTestForm = saveTestForm; window.confirmDeleteTest = confirmDeleteTest; window.doDeleteTest = doDeleteTest;
window.openAdmin = openAdmin; window.closeAdmin = closeAdmin; window.renderAdmin = renderAdmin;
window.resetMasterToFirebase = resetMasterToFirebase;
window.openAdminLogin = openAdminLogin; window.closeAdminLogin = closeAdminLogin; window.doAdminLogin = doAdminLogin; window.doAdminLogout = doAdminLogout;
window.openUserModal = openUserModal; window.closeUserModal = closeUserModal; window.doUserLogin = doUserLogin; window.doUserSignup = doUserSignup; window.userLogout = userLogout;
window.openSuggest = openSuggest; window.closeSuggest = closeSuggest; window.submitSuggest = submitSuggest;
window.openDrawer = openDrawer; window.closeDrawer = closeDrawer; window.toggleTheme = toggleTheme; window.onSearch = onSearch; window.clearSearch = clearSearch;

// Initialize specimen tabs and boot
let specimenList = ['All','Blood','Urine','Stool','CSF','Semen','Joint Fluid'];
document.getElementById('specimenTabs').innerHTML = specimenList.map(sp => `<button class="stab ${sp==='All'?'active':''}" data-sp="${sp}" onclick="setSpecimen('${sp}')">${sp==='All'?'🔬 All':sp}</button>`).join('');
loadLocalRanges();
initTheme();
render();
setTimeout(()=>{ if(window._fbReady && window._fbUser) loadUserRangesFromFirestore(); else if(window._fbReady && !window._fbUser) render(); },600);
</script>
</body>
</html>
